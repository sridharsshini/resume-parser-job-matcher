<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Parser Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }
    
    .header h1 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .header p {
      color: #666;
      font-size: 16px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    .stat-card .number {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
    }
    
    .stat-card .label {
      color: #666;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }
    
    .section h2 {
      color: #333;
      font-size: 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .candidate-card {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    
    .candidate-card:hover {
      border-color: #667eea;
      box-shadow: 0 5px 15px rgba(102,126,234,0.2);
      transform: translateY(-2px);
    }
    
    .candidate-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .candidate-name {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    
    .candidate-contact {
      color: #666;
      font-size: 14px;
      margin-bottom: 3px;
    }
    
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .status-parsed {
      background: #d4edda;
      color: #155724;
    }
    
    .skills-container {
      margin: 15px 0;
    }
    
    .skill-badge {
      display: inline-block;
      background: #f0f0f0;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 13px;
      margin: 3px;
      color: #555;
    }
    
    .matches-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }
    
    .match-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      margin: 8px 0;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #ccc;
    }
    
    .match-strong {
      border-left-color: #28a745;
      background: #d4edda;
    }
    
    .match-good {
      border-left-color: #ffc107;
      background: #fff3cd;
    }
    
    .match-partial {
      border-left-color: #fd7e14;
      background: #ffe5d0;
    }
    
    .match-weak {
      border-left-color: #dc3545;
      background: #f8d7da;
    }
    
    .match-info {
      flex: 1;
    }
    
    .match-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 3px;
    }
    
    .match-company {
      font-size: 13px;
      color: #666;
    }
    
    .match-score {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      margin-right: 10px;
    }
    
    .match-label {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 10px;
    }
    
    .label-strong {
      background: #28a745;
      color: white;
    }
    
    .label-good {
      background: #ffc107;
      color: #333;
    }
    
    .label-partial {
      background: #fd7e14;
      color: white;
    }
    
    .label-weak {
      background: #dc3545;
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.3);
    }
    
    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🎯 Resume Parser & Job Matcher</h1>
      <p>AI-Powered Recruitment Dashboard</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="number" id="totalCandidates">-</div>
        <div class="label">Candidates</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalJobs">-</div>
        <div class="label">Active Jobs</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalMatches">-</div>
        <div class="label">Total Matches</div>
      </div>
      <div class="stat-card">
        <div class="number" id="strongMatches">-</div>
        <div class="label">Strong Matches</div>
      </div>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" style="display: none;" class="error-message"></div>

    <!-- Candidates Section -->
    <div class="section">
      <h2>👥 Candidates</h2>
      <div id="candidatesContainer">
        <div class="loading">
          <div class="spinner"></div>
          Loading candidates...
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://7u8jvmvtz1.execute-api.ap-south-1.amazonaws.com/prod';
    
    let candidates = [];
    let matches = [];
    let jobs = [];

    async function loadDashboard() {
      try {
        const [candidatesRes, matchesRes, jobsRes] = await Promise.all([
          fetch(`${API_URL}/candidates`),
          fetch(`${API_URL}/matches`),
          fetch(`${API_URL}/jobs`)
        ]);

        candidates = await candidatesRes.json();
        matches = await matchesRes.json();
        jobs = await jobsRes.json();

        updateStats();
        displayCandidates();
        
      } catch (error) {
        console.error('Error loading dashboard:', error);
        showError('Failed to load dashboard data. Check your API Gateway CORS settings.');
      }
    }

    function updateStats() {
      document.getElementById('totalCandidates').textContent = candidates.length;
      document.getElementById('totalJobs').textContent = jobs.length;
      document.getElementById('totalMatches').textContent = matches.length;
      
      const strongCount = matches.filter(m => m.recommendation === 'Strong Match').length;
      document.getElementById('strongMatches').textContent = strongCount;
    }

    function displayCandidates() {
      const container = document.getElementById('candidatesContainer');
      
      if (candidates.length === 0) {
        container.innerHTML = '<div class="no-data">No candidates found. Upload a resume to get started!</div>';
        return;
      }

      container.innerHTML = candidates.map(candidate => {
        const candidateMatches = matches.filter(m => m.candidateId === candidate.candidateId);
        
        return `
          <div class="candidate-card">
            <div class="candidate-header">
              <div>
                <div class="candidate-name">${candidate.name || 'Unknown'}</div>
                <div class="candidate-contact">📧 ${candidate.email || 'N/A'}</div>
                <div class="candidate-contact">📱 ${candidate.phone || 'N/A'}</div>
              </div>
              <span class="status-badge status-parsed">${candidate.status || 'Parsed'}</span>
            </div>

            <div class="skills-container">
              <strong>💼 Skills:</strong><br>
              ${(candidate.skills || []).map(skill => 
                `<span class="skill-badge">${skill}</span>`
              ).join('')}
            </div>

            ${candidateMatches.length > 0 ? `
              <div class="matches-section">
                <strong>🎯 Job Matches (${candidateMatches.length}):</strong>
                ${candidateMatches.map(match => {
                  const matchClass = match.recommendation.toLowerCase().replace(' ', '-');
                  const labelClass = `label-${matchClass.replace('match-', '')}`;
                  
                  return `
                    <div class="match-item match-${matchClass}">
                      <div class="match-info">
                        <div class="match-title">${match.jobTitle}</div>
                        <div class="match-company">${match.company} • ${match.location}</div>
                      </div>
                      <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="match-score">${match.matchScore}%</div>
                        <span class="match-label ${labelClass}">${match.recommendation}</span>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : '<div class="matches-section"><em>No matches yet.</em></div>'}
          </div>
        `;
      }).join('');
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = `⚠️ ${message}`;
      errorDiv.style.display = 'block';
    }

    loadDashboard();
  </script>
</body>
</html>
